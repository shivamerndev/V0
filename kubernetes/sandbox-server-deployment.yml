apiVersion: apps/v1
kind: Deployment
metadata:
  name:  sandbox-server-deployment
  labels:
    name:  sandbox-server-deployment
spec:
  selector:
    matchLabels:
      app:  sandbox
  replicas: 1
  template:
    metadata:
      labels:
        app:  sandbox
    spec:
      serviceAccountName: resource-manager
      containers:
      - image:  sandbox
        name:  main-sandbox-server
        resources:
          requests:
            cpu: "250m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
        livenessProbe:
          httpGet:
            path: /_status/healthz
            port: 3000
          initialDelaySeconds: 20
          timeoutSeconds: 10
        readinessProbe:
          httpGet:
            path: /_status/healthz
            port: 3000
          initialDelaySeconds: 20
          timeoutSeconds: 10   
        env:
          - name:  REDIS_URL
            valueFrom:
              secretKeyRef:
                name: database
                key: REDIS_URL
          
          - name:  JWT_SECRET
            valueFrom:
              secretKeyRef:
                name: jwt
                key: JWT_SECRET
          
          - name: SANDBOX_DB_URL
            valueFrom:
              secretKeyRef:
                name: database
                key: SANDBOX_DB_URL
          
          - name: MQ_URL
            valueFrom:
              secretKeyRef:
                name: mq
                key: MQ_URL
                
        ports:
        - containerPort:  3000
          name:  http